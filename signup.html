<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stackly</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>
  <header class="site-header" id="site-header"></header>

  <div class="auth-page">
    <div class="auth-card animate__animated animate__fadeInUp">
      <a href="index.html" class="logo">Stack<span>ly</span>.</a>
      <h2>Create Account</h2>
      <p class="auth-sub">Join Stackly for fresh organic groceries</p>

      <form class="auth-form" id="signup-form">
        <div class="form-group">
          <label for="fullname">Full Name</label>
          <input type="text" id="fullname" name="fullname" placeholder="John Doe" required>
          <span class="error-msg"></span>
        </div>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required>
          <span class="error-msg"></span>
        </div>
        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" name="phone" placeholder="+1 234 567 8900" required>
          <span class="error-msg"></span>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Min 8 characters" required>
          <div class="password-strength"><div class="bar"></div></div>
          <span class="error-msg"></span>
        </div>
        <div class="form-group">
          <label for="confirm_password">Confirm Password</label>
          <input type="password" id="confirm_password" name="confirm_password" placeholder="Re-enter password" required>
          <span class="error-msg"></span>
        </div>
        <button type="submit" class="btn-submit">Create Account</button>
      </form>

      <p class="auth-switch">Already have an account? <a href="login.html">Sign In</a></p>
    </div>
  </div>

  <footer class="site-footer" id="site-footer"></footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-validate/1.20.0/jquery.validate.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="js/components.js"></script>
  <script src="js/redirect-404.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
