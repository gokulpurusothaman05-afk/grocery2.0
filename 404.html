<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <header class="site-header" id="site-header"></header>

  <div class="page-404">
    <div class="content animate__animated animate__fadeInUp">
      <h1 aria-hidden="true" class="animate__animated animate__fadeIn">404</h1>
      <h2>Oops! Page Not Found</h2>
      <p>The page you're looking for doesn't exist or has been moved.</p>
      <div class="actions">
        <a href="index.html" class="btn-primary"><i class="fas fa-home"></i> Back to Home</a>
        <button id="btn-back-prev" class="btn-secondary"><i class="fas fa-arrow-left"></i> Back</button>
      </div>
    </div>
  </div>

  <footer class="site-footer" id="site-footer"></footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="js/components.js"></script>
  <script>
    // Back to previous page logic: prefer referrer, then history.back(), then home
    document.getElementById('btn-back-prev')?.addEventListener('click', (e) => {
      e.preventDefault();
      try {
        const ref = document.referrer;
        if (ref && ref !== window.location.href) {
          window.location.href = ref;
          return;
        }
      } catch (err) { /* ignore */ }

      if (window.history.length > 1) {
        window.history.back();
        return;
      }

      window.location.href = 'index.html';
    });
  </script>
  <script>
    if (typeof gsap !== 'undefined') {
      gsap.from('.page-404 h1', { scale: 0.5, opacity: 0, duration: 1, ease: 'elastic.out(1, 0.5)' });
      gsap.from('.page-404 .content', { y: 30, opacity: 0, duration: 0.8, delay: 0.3 });
    }
  </script>
</body>
</html>
