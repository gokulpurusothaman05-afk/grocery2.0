<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stackly</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.13.2/themes/base/jquery-ui.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.9.0/slick.min.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body class="page-contact">

  <header class="site-header" id="site-header"></header>

  <!-- S1+S2: Split contact hero -->
  <section id="section-hero" style="padding-top:80px">
    <div class="contact-split">
      <div class="contact-info-side">
        <h2>Let's Talk Fresh</h2>
        <p>Questions about orders, partnerships, or our products? Our team is here 24/7.</p>
        <div class="info-item"><i class="fas fa-phone"></i><div><strong>Hotline</strong><br>(+91) 98765 43210</div></div>
        <div class="info-item"><i class="fas fa-envelope"></i><div><strong>Email</strong><br>hello@stackly.com</div></div>
        <div class="info-item"><i class="fas fa-map-marker-alt"></i><div><strong>HQ</strong><br>123 Anna Salai, Chennai, Tamil Nadu</div></div>
        <div class="info-item"><i class="fas fa-clock"></i><div><strong>Hours</strong><br>Mon–Sat 8AM–10PM · Sun 9AM–6PM</div></div>
      </div>
      <div class="contact-form-side" id="section-features">
        <p class="section-tag">Message Us</p>
        <h2 class="section-title" style="font-size:1.5rem;margin-bottom:24px">Send A Message</h2>
        <form class="contact-form" id="contact-form">
          <div class="form-group" style="margin-bottom:16px"><label style="font-weight:600;font-size:0.85rem">Full Name</label><input type="text" name="name" required placeholder="John Doe" style="width:100%;padding:12px;border:1.5px solid #E0E0E0;border-radius:8px;font-family:var(--font)"></div>
          <div class="form-group" style="margin-bottom:16px"><label style="font-weight:600;font-size:0.85rem">Email</label><input type="email" name="email" required placeholder="you@email.com" style="width:100%;padding:12px;border:1.5px solid #E0E0E0;border-radius:8px;font-family:var(--font)"></div>
          <div class="form-group" style="margin-bottom:16px"><label style="font-weight:600;font-size:0.85rem">Preferred Date</label><input type="text" class="datepicker" name="date" placeholder="mm/dd/yyyy" style="width:100%;padding:12px;border:1.5px solid #E0E0E0;border-radius:8px;font-family:var(--font)"></div>
          <div class="form-group" style="margin-bottom:16px"><label style="font-weight:600;font-size:0.85rem">Topic</label>
            <select name="subject" style="width:100%;padding:12px;border:1.5px solid #E0E0E0;border-radius:8px;font-family:var(--font)">
              <option>Order Support</option><option>Partnership</option><option>Feedback</option><option>Other</option>
            </select>
          </div>
          <div class="form-group" style="margin-bottom:20px"><label style="font-weight:600;font-size:0.85rem">Message</label><textarea name="message" required rows="4" placeholder="How can we help?" style="width:100%;padding:12px;border:1.5px solid #E0E0E0;border-radius:8px;font-family:var(--font);resize:vertical"></textarea></div>
          <button type="submit" class="btn-primary" style="width:100%;justify-content:center">Send Message</button>
        </form>
      </div>
    </div>
  </section>

  

  

  <footer class="site-footer" id="site-footer"></footer>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.13.2/jquery-ui.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-validate/1.20.0/jquery.validate.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.9.0/slick.min.js"></script>
  <script src="js/components.js"></script>
  <script src="js/redirect-404.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/auth.js"></script>
  <script>$('#contact-form').validate({ submitHandler: function() { window.location.href = '404.html'; } });</script>
</body>
</html>
